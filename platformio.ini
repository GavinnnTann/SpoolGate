; ESP32 NAT Router — Bambu Lab A1 Mini uplink bridge
;
; Environments:
;   esp32dev        production build — deployed state-transition logging only.
;   esp32dev-debug  adds -DNAT_DEBUG=1: verbose serial diagnostics (uplink
;                   self-test, periodic AP/DHCP/DNS/RSSI status line, STA status
;                   poll, DHCP-DNS-offer readback). Build/flash it explicitly:
;                     pio run -e esp32dev-debug -t upload
;   `pio run` (no -e) builds only esp32dev, per default_envs below.
;
; Platform pin rationale:
;   Confirmed by direct build test: the official platformio/espressif32 REGISTRY
;   platform is stuck on arduino-esp32 core 2.0.17 no matter how high its own wrapper
;   version number climbs (tested against registry platform 7.0.1 — framework package
;   was still "3.20017.241212", which decodes to core 2.0.17, per
;   cores/esp32/core_version.h: ARDUINO_ESP32_RELEASE "2_0_17"). On that core,
;   WiFi.AP.enableNAPT() does not exist at all (WiFiClass has no member AP), and the
;   underlying ip_napt_enable_no() is declared in lwip/lwip_napt.h but missing from the
;   precompiled lwIP archive — undefined reference at link time. This is a well-known,
;   long-standing issue, not a transient problem.
;
;   The community pioarduino fork is the only currently-available path to arduino-esp32
;   core 3.x under PlatformIO; it is not published to the PlatformIO registry (checked:
;   no "pioarduino" owner exists there), only as GitHub release assets, hence the URL
;   below instead of an "owner/name" registry reference. This is otherwise a completely
;   normal platformio.ini platform pin — PlatformIO supports URL-based platform sources
;   natively. Confirmed working: compiles, WiFi.AP.enableNAPT() resolves at link time,
;   boot banner reports arduino-esp32 core 3.3.9.
;
;   Do not switch this back to platformio/espressif32 (the registry one) — it silently
;   compiles right up until the NAPT call and fails only at link time, which wastes a
;   full build cycle discovering the same dead end again.

[platformio]
default_envs = esp32dev

; Board: ESP32-S3-DevKitC-1 (switched from the ESP32-S3-Zero, which ran too hot for
; continuous AP+STA+NAT duty). Same ESP32-S3 chip family, so the firmware is
; unchanged; NAPT is implemented at the esp_netif/lwIP level (esp_netif_napt_enable
; in AP.cpp) with no chip-specific gating. No GPIOs are used by this project, so
; exact pin mapping is irrelevant. The DevKitC is physically larger with a sturdier
; regulator and more copper to dissipate heat.
;
; USB / serial: the DevKitC-1 has TWO USB-C ports. Flash and monitor via the one
; labelled "UART" — it goes through an onboard USB-to-UART bridge that (a) maps to a
; STABLE COM port and (b) drives the DTR/RTS auto-reset circuit, so uploads reset
; into the bootloader and back automatically. That's why there is NO
; ARDUINO_USB_CDC_ON_BOOT flag here: with the UART port, Serial is hardware UART0,
; which the bridge already exposes. (The S3-Zero had only a native-USB port and thus
; needed CDC-on-boot plus the COM-port-shuffle workarounds — none of that applies
; here.) If you instead plug into the port labelled "USB" (native USB-OTG), you'd
; get no serial output until CDC-on-boot is added back — so use the UART port.
[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

build_flags =
	-DCORE_DEBUG_LEVEL=3
	; Onboard WS2812 RGB LED GPIO. The generic esp32s3 variant's RGB_BUILTIN is
	; GPIO48, but this particular DevKitC-1 board wires the LED to GPIO38 (verified
	; on hardware: nothing lit on 48, works on 38). See src/statusled.cpp.
	-DSTATUS_LED_PIN=38

; NAPT needs a larger IP forwarding table and more lwIP TCP PCBs than the default
; Arduino sdkconfig provides. These are baked into the prebuilt IDF libraries on
; the Arduino framework, so they cannot be overridden here — see docs/NOTES.md.

; Diagnostic build. Inherits everything from esp32dev and adds NAT_DEBUG. Kept as a
; separate env (rather than a runtime flag) so the deployed firmware carries none of
; the diagnostic code — the blocking uplink self-test in particular has no business
; running in production.
[env:esp32dev-debug]
extends = env:esp32dev
build_flags =
	${env:esp32dev.build_flags}
	-DNAT_DEBUG=1
